<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CoC Weekly Report</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fa;
      --text: #111827;
      --muted: #5b6472;
      --card: #ffffff;
      --border: #d9e0ea;
      --accent: #0f766e;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 16px;
    }
    header {
      margin-bottom: 20px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      line-height: 1.15;
    }
    .meta {
      margin: 0;
      color: var(--muted);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font: inherit;
      line-height: 1.55;
    }
    footer {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .period {
      color: var(--accent);
      font-weight: 700;
    }
    @media (max-width: 560px) {
      main {
        padding: 24px 12px;
      }
      h1 {
        font-size: 1.6rem;
      }
      .card {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Clash of Clans Weekly Report</h1>
      <p class="meta">Generated: 2026-04-26 16:04:31 UTC</p>
      <p class="meta">Report period: <span class="period">Last 7 days</span></p>
    </header>
    <section class="card" aria-label="Weekly report text">
      <pre>No war data available for the selected period.</pre>
    </section>
    <footer>
      Report generated from local saved war snapshots.
    </footer>
  </main>
</body>
</html>
